<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Estrela Rastreamento</title>
    <link rel="stylesheet" href="../css/loguin.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            <img src="../imagens/logo (1).png" alt="Logo Estrela" class="login-logo">
            <h2>Área do Cliente</h2>
            <p>Acesse o monitoramento do seu veículo</p>
            
            <form id="loginForm" action="login.php" method="POST">
    <div class="input-group">
        <input type="email" name="email" id="email" placeholder="E-mail" required class="btn-login">
    </div>
    <div class="input-group">
        <input type="password" name="password" id="password" placeholder="Senha" required class="btn-login">
    </div>
    <button type="submit" class="btn-entrar">Entrar</button>
</form>
            
            <div class="login-footer">
                <a href="#">Esqueceu a senha?</a>
                <a href="../index.html">Voltar ao site</a>
            </div>
        </div>
    </div>
